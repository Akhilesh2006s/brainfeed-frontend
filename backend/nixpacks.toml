# Node 18 was removed from nixpkgs (EOL). Let Nixpacks install Node 20+ via NIXPACKS_NODE_VERSION.
[variables]
NIXPACKS_NODE_VERSION = "20"
NPM_CONFIG_PRODUCTION = "false"
NODE_ENV = "production"

[phases.install]
cmds = ["npm install --production=false"]

[phases.build]
cmds = []

[start]
cmd = "node index.js"
